name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-mcp-registry:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version into server.json
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          # The committed server.json carries "0.0.0" as a placeholder for the
          # server version and inside the OCI identifier tag. Both get pinned
          # to the released tag here so the registry entry is immutable
          # per-release. The OCI package must encode the version in the
          # identifier (e.g. "ghcr.io/.../pacer-mcp:1.2.3") rather than a
          # separate "version" field, which the registry rejects.
          jq --arg v "$VERSION" \
            '.version = $v
             | .packages[0].identifier =
                 (.packages[0].identifier | sub(":0\\.0\\.0$"; ":" + $v))' \
            server.json > server.json.tmp
          mv server.json.tmp server.json
          cat server.json

      - name: Install mcp-publisher
        run: |
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_${OS}_${ARCH}.tar.gz" \
            | tar xz mcp-publisher
          chmod +x mcp-publisher

      - name: Publish to MCP Registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish

  update-homebrew:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: release
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern checksums.txt

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.CLICKUP_TAP_TOKEN }}
        run: |
          TAG=${{ steps.release.outputs.tag }}
          VERSION=${{ steps.release.outputs.version }}
          ARM64_SHA=$(grep "pacer-mcp_${VERSION}_darwin_arm64.tar.gz" checksums.txt | awk '{print $1}')
          if [ -z "$ARM64_SHA" ]; then
            echo "::error::could not find darwin_arm64 sha in checksums.txt"
            cat checksums.txt
            exit 1
          fi
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/$TAG"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/STR-Consulting/homebrew-tap.git" tap
          mkdir -p tap/Formula

          cat > tap/Formula/pacer-mcp.rb << FORMULA
          class PacerMcp < Formula
            desc "MCP server exposing pacer/core API endpoints as Claude Code tools"
            homepage "https://github.com/${{ github.repository }}"
            version "$VERSION"
            license "MIT"

            on_arm do
              url "$BASE_URL/pacer-mcp_${VERSION}_darwin_arm64.tar.gz"
              sha256 "$ARM64_SHA"
            end

            def install
              bin.install "pacer-mcp" => "pacer-mcp"
            end
          end
          FORMULA

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update pacer-mcp to $TAG"
          git push

  update-scoop:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: release
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern checksums.txt

      - name: Update Scoop bucket
        env:
          TAP_TOKEN: ${{ secrets.CLICKUP_TAP_TOKEN }}
        run: |
          TAG=${{ steps.release.outputs.tag }}
          VERSION=${{ steps.release.outputs.version }}
          WIN_SHA=$(grep "pacer-mcp_${VERSION}_windows_amd64.zip" checksums.txt | awk '{print $1}')
          if [ -z "$WIN_SHA" ]; then
            echo "::error::could not find windows_amd64 sha in checksums.txt"
            cat checksums.txt
            exit 1
          fi
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/$TAG"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/STR-Consulting/scoop-bucket.git" bucket

          cat > bucket/pacer-mcp.json << MANIFEST
          {
            "version": "$VERSION",
            "architecture": {
              "64bit": {
                "url": "$BASE_URL/pacer-mcp_${VERSION}_windows_amd64.zip",
                "hash": "$WIN_SHA"
              }
            },
            "bin": "pacer-mcp.exe"
          }
          MANIFEST

          cd bucket
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pacer-mcp.json
          git diff --cached --quiet || git commit -m "bump pacer-mcp to ${VERSION}"
          git push
