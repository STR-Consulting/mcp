version: 2

project_name: pacer-mcp

builds:
  - binary: pacer-mcp
    goos:
      - darwin
      - windows
    goarch:
      - arm64
      - amd64
    ignore:
      - goos: darwin
        goarch: amd64
      - goos: windows
        goarch: arm64

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

release:
  draft: false
