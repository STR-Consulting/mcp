version: 2

project_name: pacer-mcp

builds:
  - binary: pacer-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - windows
      - linux
    goarch:
      - arm64
      - amd64
    ignore:
      - goos: darwin
        goarch: amd64
      - goos: windows
        goarch: arm64

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

dockers_v2:
  - id: pacer-mcp
    dockerfile: Dockerfile
    images:
      - ghcr.io/str-consulting/pacer-mcp
    tags:
      - "{{ .Version }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      "org.opencontainers.image.title": "pacer-mcp"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.source": "{{ .GitURL }}"
      "org.opencontainers.image.licenses": "MIT"

release:
  # goreleaser-action @v6 (goreleaser 2.16.0) reliably 401s mid-upload on this
  # private repo: it creates the release at an `untagged-*` URL because the
  # tag/release association doesn't propagate before the upload calls, then
  # every asset upload to the floating release-id gets rejected. Skip
  # goreleaser's GitHub release entirely and let the workflow create +
  # populate it via `gh release create`, which the MCPB bundle step already
  # does successfully.
  disable: true
